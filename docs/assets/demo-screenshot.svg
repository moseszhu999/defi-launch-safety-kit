<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">DeFi Launch Safety Kit demo screenshot</title>
  <desc id="desc">A terminal-style visual showing a Solidity launch-readiness scan result with critical findings, contract surface map, readiness score, SARIF and audit-prep outputs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <text x="70" y="78" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700">DeFi Launch Safety Kit</text>
  <text x="70" y="116" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="20">Pre-audit and launch-readiness toolkit for DeFi / token projects</text>

  <rect x="70" y="155" width="1060" height="430" rx="22" fill="#0b1120" stroke="#334155" filter="url(#shadow)"/>
  <rect x="70" y="155" width="1060" height="52" rx="22" fill="#111827"/>
  <circle cx="104" cy="181" r="7" fill="#ef4444"/>
  <circle cx="128" cy="181" r="7" fill="#f59e0b"/>
  <circle cx="152" cy="181" r="7" fill="#22c55e"/>
  <text x="185" y="188" fill="#94a3b8" font-family="Menlo, Consolas, monospace" font-size="16">dlsk scan --source RiskyToken.sol --profile erc20 --format all</text>

  <text x="105" y="250" fill="#38bdf8" font-family="Menlo, Consolas, monospace" font-size="22" font-weight="700">Overall Risk: CRITICAL</text>
  <text x="105" y="286" fill="#e2e8f0" font-family="Menlo, Consolas, monospace" font-size="18">Findings: 46  |  Critical: 2  High: 14  Medium: 25</text>
  <text x="105" y="322" fill="#e2e8f0" font-family="Menlo, Consolas, monospace" font-size="18">Contract Map: 1 contract, 9 public/external functions, 7 privileged</text>
  <text x="105" y="358" fill="#e2e8f0" font-family="Menlo, Consolas, monospace" font-size="18">Project Readiness: PARTIAL 10/14</text>
  <text x="105" y="394" fill="#e2e8f0" font-family="Menlo, Consolas, monospace" font-size="18">Outputs: Markdown · JSON · HTML · SARIF · Audit Prep Pack</text>

  <rect x="105" y="430" width="302" height="92" rx="14" fill="#111827" stroke="#334155"/>
  <text x="130" y="466" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Owner/Admin Review</text>
  <text x="130" y="496" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="15">Mint, pause, tax, rescue, upgrade</text>

  <rect x="449" y="430" width="302" height="92" rx="14" fill="#111827" stroke="#334155"/>
  <text x="474" y="466" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">CI / SARIF Gate</text>
  <text x="474" y="496" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="15">Block new high-risk findings</text>

  <rect x="793" y="430" width="302" height="92" rx="14" fill="#111827" stroke="#334155"/>
  <text x="818" y="466" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Audit Prep Pack</text>
  <text x="818" y="496" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="15">Known risks, questions, checklist</text>

  <text x="70" y="632" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="16">github.com/moseszhu999/defi-launch-safety-kit</text>
</svg>
